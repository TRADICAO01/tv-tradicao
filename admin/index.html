<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Tradição - Admin</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:30px;
}

.card{

    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);

}

button{

    width:100%;
    padding:18px;
    font-size:18px;
    margin-top:15px;

}

</style>

</head>

<body>

<div class="card">

<h2>TV Tradição</h2>

<input
    type="file"
    id="arquivo"
    accept="image/*,video/*"
    multiple
    style="display:none;"
>

<button onclick="document.getElementById('arquivo').click()">
📷 Adicionar imagens
</button>

<button type="button" onclick="carregarTVs()">
    🖥 Escolher TVs
</button>

<div id="listaTVs" style="
margin-top:20px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
display:none;
"></div>

<button id="btnPublicar">🚀 Publicar</button>
<hr style="margin:20px 0">

<h3>Mídias cadastradas</h3>

<div id="listaMidias"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log("Script iniciou");
const SUPABASE_URL = "https://bdlzvjksuutaebeqophb.supabase.co";
const SUPABASE_KEY = "sb_publishable_I1g-Cg1CtQO_O4q-9PzsVw_bfKj-avn";

const clienteSupabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const arquivo = document.getElementById("arquivo");

arquivo.addEventListener("change", async () => {
    console.log("Arquivo selecionado");

    if (arquivo.files.length === 0) return;

    const file = arquivo.files[0];

    const nomeArquivo = Date.now() + "_" + file.name;

    const { error: uploadError } = await clienteSupabase.storage
        .from("midias")
        .upload(nomeArquivo, file);

    if (uploadError) {
        alert(uploadError.message);
        return;
    }

const { data: novaMidia, error: bancoError } = await clienteSupabase
    .from("midias2")
.insert({
    arquivo: nomeArquivo,
    duracao: 10
})
    .select()
    .single();

window.ultimaMidiaId = novaMidia.id;
console.log("ID salvo:", window.ultimaMidiaId);
console.log("Nova mídia:", novaMidia);

    if (bancoError) {
        alert(bancoError.message);
        return;
    }

    alert("Imagem enviada com sucesso!");

});

async function carregarTVs() {
console.log("carregarTVs iniciou");
    const { data, error } = await clienteSupabase
        .from("tvs")
        .select("*")
        .eq("ativa", true)
        .order("nome");
    console.log(data);
    console.log(error);

    if (error) {
        console.log(error);
        return;
    }

    const lista = document.getElementById("listaTVs");

    lista.innerHTML = "";
    lista.style.display = "block";

    data.forEach(tv => {

        lista.innerHTML += `
            <label style="display:block;margin:8px 0;">
                <input type="checkbox" value="${tv.id}">
                ${tv.nome}
            </label>
        `;

    });

}
async function carregarMidias(){

    const { data: midias, error } = await clienteSupabase
        .from("midias2")
        .select("*")
        .order("id",{ascending:false});

    if(error){
        console.log(error);
        return;
    }


    const lista=document.getElementById("listaMidias");
    lista.innerHTML="";
    lista.style.display = "block";

    midias.forEach(midia=>{

        const tipo=/\.(mp4|mov|webm|m4v)$/i.test(midia.arquivo)
            ? "video"
            : "imagem";

        const url=clienteSupabase.storage
            .from("midias")
            .getPublicUrl(midia.arquivo).data.publicUrl;

        lista.innerHTML+=`
        <div style="
        border:1px solid #ccc;
        padding:15px;
        margin:15px 0;
        border-radius:10px;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:12px;
        ">

${tipo==="imagem"
    ? `<img src="${url}" style="
        width:100%;
        max-width:320px;
        border-radius:8px;
    ">`
    : `<video src="${url}" controls style="
        width:100%;
        max-width:320px;
        border-radius:8px;
    "></video>`
}

            <br><br>

           <button
           onclick="excluirMidia(${midia.id},'${midia.arquivo}')"
           style="
           width:100%;
           max-width:320px;
           padding:14px;
           font-size:18px;
           background:#d32f2f;
           color:white;
           border:none;
           border-radius:8px; 
           cursor:pointer;
           "> 
           🗑 Excluir
           </button>


        </div>`;
    });

}

document.getElementById("btnPublicar").addEventListener("click", async () => {
const tvsSelecionadas = [...document.querySelectorAll("#listaTVs input:checked")]
    .map(x => Number(x.value));
    if (tvsSelecionadas.length === 0) {
    alert("Selecione pelo menos uma TV.");
    return;
}
console.log("Última mídia:", window.ultimaMidiaId);
for (const tvId of tvsSelecionadas) {
    console.log("TV:", tvId);
console.log("MIDIA:", window.ultimaMidiaId);
    const { error } = await clienteSupabase
        .from("publicacoes")
        .insert({
           midia_id: window.ultimaMidiaId,
            tv_id: tvId
        });

if (error) {
    console.log(error);
    alert(error.message);
    return;

    }
}

alert("Publicado com sucesso!");
carregarMidias();

});
async function excluirMidia(id, arquivo){

    console.log("ID RECEBIDO:", id);

    if(!confirm("Excluir esta mídia?")) return;

    const r1 = await clienteSupabase.storage
        .from("midias")
        .remove([arquivo]);

    console.log("STORAGE:", r1);

const r2 = await clienteSupabase
    .from("midias2")
    .delete()
    .eq("id", id);

console.log("BANCO:", r2);

if (r2.error) {
    alert(r2.error.message);
}

    await carregarMidias();
}

carregarTVs();
carregarMidias();
</script>
</body>
</html>
