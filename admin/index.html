<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Tradição - Admin</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:30px;
}

.card{

    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);

}

button{

    width:100%;
    padding:18px;
    font-size:18px;
    margin-top:15px;

}

</style>

</head>

<body>

<div class="card">

<h2>TV Tradição</h2>

<input type="file" id="arquivo" accept="image/*" multiple hidden>

<button onclick="document.getElementById('arquivo').click()">
📷 Adicionar imagens
</button>

<button>📺 Escolher TV</button>
<div id="listaTVs" style="margin-top:20px;"></div>

<button id="btnPublicar">🚀 Publicar</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log("Script iniciou");
const SUPABASE_URL = "https://bdlzvjksuutaebeqophb.supabase.co";
const SUPABASE_KEY = "sb_publishable_I1g-Cg1CtQO_O4q-9PzsVw_bfKj-avn";

const clienteSupabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const arquivo = document.getElementById("arquivo");

arquivo.addEventListener("change", async () => {
    console.log("Arquivo selecionado");

    if (arquivo.files.length === 0) return;

    const file = arquivo.files[0];

    const nomeArquivo = Date.now() + "_" + file.name;

    const { error: uploadError } = await clienteSupabase.storage
        .from("midias")
        .upload(nomeArquivo, file);

    if (uploadError) {
        alert(uploadError.message);
        return;
    }

const { data: novaMidia, error: bancoError } = await clienteSupabase
    .from("midias2")
.insert({
    arquivo: nomeArquivo,
    duracao: 10
})
    .select()
    .single();

window.ultimaMidiaId = novaMidia.id;

console.log("Nova mídia:", novaMidia);

    if (bancoError) {
        alert(bancoError.message);
        return;
    }

    alert("Imagem enviada com sucesso!");

});
async function carregarTVs() {
console.log("carregarTVs iniciou");
    const { data, error } = await clienteSupabase
        .from("tvs")
        .select("*")
        .eq("ativa", true)
        .order("nome");
    console.log(data);
    console.log(error);

    if (error) {
        console.log(error);
        return;
    }

    const lista = document.getElementById("listaTVs");

    lista.innerHTML = "";

    data.forEach(tv => {

        lista.innerHTML += `
            <label style="display:block;margin:8px 0;">
                <input type="checkbox" value="${tv.id}">
                ${tv.nome}
            </label>
        `;

    });

}
document.getElementById("btnPublicar").addEventListener("click", async () => {
const tvsSelecionadas = [...document.querySelectorAll("#listaTVs input:checked")]
    .map(x => Number(x.value));
console.log("Última mídia:", window.ultimaMidiaId);
for (const tvId of tvsSelecionadas) {
    const { error } = await clienteSupabase
        .from("publicacoes")
        .insert({
           midia_id: window.ultimaMidiaId,
            tv_id: tvId
        });

if (error) {
    console.log(error);
    alert(error.message);
    return;

    }
}

alert("Publicado com sucesso!");

});
carregarTVs();
</script>
</body>
</html>
