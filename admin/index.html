<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Tradição - Admin</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:30px;
}

.card{

    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);

}

button{

    width:100%;
    padding:18px;
    font-size:18px;
    margin-top:15px;

}

</style>

</head>

<body>

<div class="card">

<h2>TV Tradição</h2>

<input type="file" id="arquivo" accept="image/*" multiple hidden>

<button onclick="document.getElementById('arquivo').click()">
📷 Adicionar imagens
</button>

<button>📺 Escolher TV</button>

<button>🚀 Publicar</button>

</div>
<script>

const arquivo = document.getElementById("arquivo");

arquivo.addEventListener("change", () => {

    alert(
        arquivo.files.length +
        " imagem(ns) selecionada(s)."
    );

});

</script>
</body>
</html>
