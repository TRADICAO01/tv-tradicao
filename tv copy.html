<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Tradição</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

img{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>

</head>

<body>

<img id="imagemTV" src="">

<script>

const SUPABASE_URL="https://bdlzvjksuutaebeqophb.supabase.co";
const SUPABASE_KEY="sb_publishable_I1g-Cg1CtQO_O4q-9PzsVw_bfKj-avn";

const clienteSupabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

console.log("TV iniciou");
const parametros = new URLSearchParams(window.location.search);
const tvId = Number(parametros.get("id"));
let indice = 0;
let publicacoes = [];

console.log("TV:", tvId);

async function carregarImagem() {

const { data, error } = await clienteSupabase
    .from("publicacoes")
    .select("*")
    .eq("tv_id", tvId)
    .order("id", { ascending: true });
console.log("TODAS AS PUBLICACOES:", data);
console.log("ERRO:", error);

    console.log(data);
    publicacoes = data;
    console.log(error);
    if (!data || data.length === 0) return;

const publicacao = publicacoes[indice];
const midiaId = publicacao.midia_id;

indice++;
if (indice >= publicacoes.length) {
    indice = 0;
}

console.log("Mídia:", midiaId);

const { data: midia, error: erroMidia } = await clienteSupabase
    .from("midias2")
    .select("*")
    .eq("id", midiaId)
    .single();

console.log("MIDIA:", midia);
console.log("ERRO MIDIA:", erroMidia);

if (erroMidia || !midia) return;
const duracao = midia.duracao;

const { data: url } = clienteSupabase.storage
    .from("midias")
    .getPublicUrl(midia.arquivo);

console.log("URL:", url.publicUrl);

document.getElementById("imagemTV").src = url.publicUrl;
console.log("Duração:", duracao);
setTimeout(() => {
    carregarImagem();
}, duracao * 1000);

}

carregarImagem();
</script>

</body>
</html>
