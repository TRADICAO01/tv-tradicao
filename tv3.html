<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TV Tradição</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#img,
#video{
    width:100%;
    height:100%;
    object-fit:contain;
    display:none;
    background:#000;
}

</style>

</head>

<body>

<img id="img">

<video
    id="video"
    autoplay
    muted
    playsinline
></video>

<script>

const SUPABASE_URL="https://bdlzvjksuutaebeqophb.supabase.co";
const SUPABASE_KEY="sb_publishable_I1g-Cg1CtQO_O4q-9PzsVw_bfKj-avn";

const clienteSupabase=window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const tvId=Number(
    new URLSearchParams(location.search).get("id")
)||1;

const img=document.getElementById("img");
const video=document.getElementById("video");

let playlist=[];
let indice=0;

async function carregarPlaylist(){

    const {data,error}=await clienteSupabase
        .from("publicacoes")
        .select(`
            id,
            midias2(
                arquivo,
                duracao
            )
        `)
        .eq("tv_id",tvId)
        .order("id");

    if(error){
        console.log(error);
        return;
    }

    playlist=[];

    data.forEach(item=>{

        if(!item.midias2) return;

        const arquivo=item.midias2.arquivo;

        const extensao=arquivo
            .split(".")
            .pop()
            .toLowerCase();

        const url=clienteSupabase.storage
            .from("midias")
            .getPublicUrl(arquivo)
            .data.publicUrl;

        playlist.push({

            tipo:[
                "mp4",
                "mov",
                "webm",
                "m4v"
            ].includes(extensao)
            ?"video"
            :"imagem",

            url:url,

            duracao:item.midias2.duracao||10

        });

    });
}

function mostrarMidia(){

    if(playlist.length===0){

        setTimeout(async()=>{

            await carregarPlaylist();
            mostrarMidia();

        },3000);

        return;
    }

    if(indice>=playlist.length){
        indice=0;
    }

    const midia=playlist[indice];

    if(midia.tipo==="video"){
        mostrarVideo(midia);
    }else{
        mostrarImagem(midia);
    }

}

function mostrarImagem(midia){

    video.pause();
    video.removeAttribute("src");
    video.load();
    video.style.display="none";

    img.style.display="block";
    img.src=midia.url;

    setTimeout(async()=>{

        indice++;

        await carregarPlaylist();

        mostrarMidia();

    },midia.duracao*1000);

}

function mostrarVideo(midia){

    img.style.display="none";

    video.style.display="block";

    video.src=midia.url;

    video.load();

    video.onended=async()=>{

        indice++;

        await carregarPlaylist();

        mostrarMidia();

    };

    video.onerror=(e)=>{
        console.log("Erro vídeo",e);
    };

    video.play().catch(console.error);

}
async function iniciar(){

    await carregarPlaylist();

    mostrarMidia();

    setInterval(async()=>{

        const indiceAtual=indice;

        await carregarPlaylist();

        if(indiceAtual<playlist.length){
            indice=indiceAtual;
        }

    },10000);

}

iniciar();

</script>

</body>
</html>
